# ============================================================
# Application
# ============================================================
spring.application.name=soap-rest-case-study
server.port=8080

# ============================================================
# Datasource – H2 in-memory (default / local development)
# ============================================================
spring.datasource.url=jdbc:h2:mem:countrydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================================
# Logging
# ============================================================
logging.level.com.ncba.casestudy=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
